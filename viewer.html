<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First-Click Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    color: #111;
    min-height: 100vh;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  #header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header h1 { font-size: 18px; font-weight: 700; color: #111; }
  #load-btn {
    margin-left: auto;
    padding: 8px 18px;
    background: #4f8ef7;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #load-btn:hover { background: #3a7ae0; }
  #file-input { display: none; }

  /* Main layout */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 280px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
  }
  .session-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
  }
  .session-item:hover { background: #f8f8f8; }
  .session-item.active { background: #eef3ff; }
  .session-name { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .session-meta { font-size: 12px; color: #888; }
  .validity-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 100px;
    margin-top: 5px;
    font-weight: 500;
  }
  .badge-valid { background: #e6f9ee; color: #1a8040; }
  .badge-invalid { background: #fff3e0; color: #b84800; }

  /* Drop zone */
  #drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed #ccc;
    border-radius: 16px;
    margin: 40px;
    color: #aaa;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  #drop-zone.drag-over { border-color: #4f8ef7; background: #eef3ff; color: #4f8ef7; }
  #drop-zone-icon { font-size: 48px; margin-bottom: 16px; }
  #drop-zone h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #555; }
  #drop-zone p { font-size: 14px; color: #aaa; }

  /* Viewer area */
  #viewer-area {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: none;
  }
  #viewer-area.visible { display: block; }

  /* Screenshot container */
  #screenshot-wrap {
    position: relative;
    display: inline-block;
    max-width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    border-radius: 4px;
    overflow: hidden;
    background: #eee;
  }
  #screenshot-img {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* Hotspot */
  .hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .hotspot svg { display: block; overflow: visible; }
  .hotspot .ring {
    fill: none;
    stroke: #e53935;
    stroke-width: 2.5;
    opacity: 0.85;
  }
  .hotspot .dot {
    fill: #e53935;
    opacity: 0.9;
  }
  .hotspot.dim .ring { stroke: #aaa; opacity: 0.4; }
  .hotspot.dim .dot { fill: #aaa; opacity: 0.4; }
  .hotspot.active .ring { stroke: #1565c0; opacity: 1; }
  .hotspot.active .dot { fill: #1565c0; opacity: 1; }

  /* Exploratory numbered hotspots + connecting path */
  .order-badge {
    min-width: 22px; height: 22px; padding: 0 5px;
    background: #1565c0; color: #fff; border-radius: 100px;
    font-size: 12px; font-weight: 700; line-height: 22px; text-align: center;
    box-shadow: 0 1px 5px rgba(0,0,0,0.35); border: 2px solid #fff;
  }
  #path-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  #path-overlay .path-line {
    fill: none; stroke: #1565c0; stroke-width: 2;
    stroke-dasharray: 4 3; opacity: 0.6;
    vector-effect: non-scaling-stroke;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: rgba(20,20,30,0.92);
    color: #fff;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    white-space: nowrap;
    pointer-events: none;
    transform: translate(-50%, calc(-100% - 14px));
    left: 50%;
    top: 0;
    display: none;
    z-index: 20;
    max-width: 260px;
    white-space: normal;
  }
  .hotspot:hover .tooltip { display: block; }
  .tooltip strong { display: block; margin-bottom: 3px; font-size: 13px; }

  /* Empty state for viewer */
  #viewer-empty {
    padding: 60px 24px;
    text-align: center;
    color: #aaa;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>First-Click Viewer</h1>
    <button id="load-btn">Load .fct files</button>
    <input type="file" id="file-input" accept=".fct" multiple>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">Sessions (<span id="session-count">0</span>)</div>
      <div id="session-list"></div>
    </div>
    <div id="drop-zone">
      <div id="drop-zone-icon">📂</div>
      <h2>Drop .fct files here</h2>
      <p>Or click "Load .fct files" above</p>
    </div>
    <div id="viewer-area">
      <div id="screenshot-wrap">
        <img id="screenshot-img" alt="Prototype screenshot">
      </div>
      <div id="viewer-empty" style="display:none">No screenshot available for this session.</div>
    </div>
  </div>
</div>

<script>
/* ---- Inlined SHA-256 (no external dependency) ---- */
(function (global) {
  'use strict';
  function sha256hex(message) {
    var msg = encodeUTF8(message);
    var msgLen = msg.length;
    var H = [
      0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
      0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
    ];
    var K = [
      0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
      0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
      0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
      0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
      0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
      0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
      0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
      0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
      0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
      0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
      0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
      0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
      0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
      0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
      0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
      0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
    ];
    msg[msgLen] = 0x80;
    var l = msgLen + 1;
    while (l % 64 !== 56) { msg[l++] = 0; }
    var bitLen = msgLen * 8;
    msg[l++] = 0; msg[l++] = 0; msg[l++] = 0; msg[l++] = 0;
    msg[l++] = (bitLen >>> 24) & 0xff;
    msg[l++] = (bitLen >>> 16) & 0xff;
    msg[l++] = (bitLen >>> 8) & 0xff;
    msg[l++] = bitLen & 0xff;
    for (var i = 0; i < msg.length; i += 64) {
      var W = new Array(64);
      for (var j = 0; j < 16; j++) {
        W[j] = (msg[i+j*4] << 24) | (msg[i+j*4+1] << 16) | (msg[i+j*4+2] << 8) | msg[i+j*4+3];
      }
      for (var j = 16; j < 64; j++) {
        var s0 = rotr(W[j-15], 7) ^ rotr(W[j-15], 18) ^ (W[j-15] >>> 3);
        var s1 = rotr(W[j-2], 17) ^ rotr(W[j-2], 19) ^ (W[j-2] >>> 10);
        W[j] = (W[j-16] + s0 + W[j-7] + s1) >>> 0;
      }
      var a = H[0], b = H[1], c = H[2], d = H[3];
      var e = H[4], f = H[5], g = H[6], h = H[7];
      for (var j = 0; j < 64; j++) {
        var S1 = rotr(e, 6) ^ rotr(e, 11) ^ rotr(e, 25);
        var ch = (e & f) ^ (~e & g);
        var temp1 = (h + S1 + ch + K[j] + W[j]) >>> 0;
        var S0 = rotr(a, 2) ^ rotr(a, 13) ^ rotr(a, 22);
        var maj = (a & b) ^ (a & c) ^ (b & c);
        var temp2 = (S0 + maj) >>> 0;
        h = g; g = f; f = e;
        e = (d + temp1) >>> 0;
        d = c; c = b; b = a;
        a = (temp1 + temp2) >>> 0;
      }
      H[0] = (H[0] + a) >>> 0; H[1] = (H[1] + b) >>> 0;
      H[2] = (H[2] + c) >>> 0; H[3] = (H[3] + d) >>> 0;
      H[4] = (H[4] + e) >>> 0; H[5] = (H[5] + f) >>> 0;
      H[6] = (H[6] + g) >>> 0; H[7] = (H[7] + h) >>> 0;
    }
    var hex = '';
    for (var i = 0; i < 8; i++) hex += ('00000000' + H[i].toString(16)).slice(-8);
    return hex;
  }
  function rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
  function encodeUTF8(str) {
    var bytes = [];
    for (var i = 0; i < str.length; i++) {
      var code = str.charCodeAt(i);
      if (code < 0x80) { bytes.push(code); }
      else if (code < 0x800) { bytes.push(0xc0 | (code >> 6)); bytes.push(0x80 | (code & 0x3f)); }
      else if (code >= 0xd800 && code <= 0xdbff && i + 1 < str.length) {
        var next = str.charCodeAt(i + 1);
        if (next >= 0xdc00 && next <= 0xdfff) {
          var cp = 0x10000 + ((code - 0xd800) << 10) + (next - 0xdc00);
          bytes.push(0xf0 | (cp >> 18)); bytes.push(0x80 | ((cp >> 12) & 0x3f));
          bytes.push(0x80 | ((cp >> 6) & 0x3f)); bytes.push(0x80 | (cp & 0x3f)); i++;
        }
      } else { bytes.push(0xe0 | (code >> 12)); bytes.push(0x80 | ((code >> 6) & 0x3f)); bytes.push(0x80 | (code & 0x3f)); }
    }
    return bytes;
  }
  global.sha256hex = sha256hex;
}(window));

/* ---- Inlined canonicalJSON ---- */
(function (global) {
  'use strict';
  function canonicalJSON(obj) {
    if (obj === null || obj === undefined) return 'null';
    if (typeof obj === 'boolean') return obj ? 'true' : 'false';
    if (typeof obj === 'number') { if (!isFinite(obj)) return 'null'; return String(obj); }
    if (typeof obj === 'string') return JSON.stringify(obj);
    if (Array.isArray(obj)) {
      var items = [];
      for (var i = 0; i < obj.length; i++) items.push(canonicalJSON(obj[i]));
      return '[' + items.join(',') + ']';
    }
    if (typeof obj === 'object') {
      var keys = Object.keys(obj).sort();
      var pairs = [];
      for (var k = 0; k < keys.length; k++) pairs.push(JSON.stringify(keys[k]) + ':' + canonicalJSON(obj[keys[k]]));
      return '{' + pairs.join(',') + '}';
    }
    return 'null';
  }
  global.canonicalJSON = canonicalJSON;
}(window));

(function () {
  'use strict';

  var SECRET = 'TRACKER_SECRET_v1';

  // All sessions after deduplication (keyed by testerName, earliest wins)
  var sessionsByName = {};  // testerName -> session object
  var allSessions = [];     // ordered list of deduplicated sessions
  var activeSessionId = null;

  /* ---- DOM refs ---- */
  var dropZone = document.getElementById('drop-zone');
  var viewerArea = document.getElementById('viewer-area');
  var screenshotWrap = document.getElementById('screenshot-wrap');
  var screenshotImg = document.getElementById('screenshot-img');
  var sessionList = document.getElementById('session-list');
  var sessionCount = document.getElementById('session-count');
  var fileInput = document.getElementById('file-input');
  var loadBtn = document.getElementById('load-btn');

  /* ---- Drag and drop ---- */
  dropZone.addEventListener('click', function () { fileInput.click(); });
  loadBtn.addEventListener('click', function () { fileInput.click(); });

  document.addEventListener('dragover', function (e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  document.addEventListener('dragleave', function (e) {
    if (!e.relatedTarget) dropZone.classList.remove('drag-over');
  });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', function () {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });

  /* ---- File handling ---- */
  function handleFiles(files) {
    var arr = Array.prototype.slice.call(files);
    arr.forEach(function (file) {
      var reader = new FileReader();
      reader.onload = function (e) {
        processFileContent(e.target.result);
      };
      reader.readAsText(file);
    });
  }

  function processFileContent(text) {
    var session;
    try {
      // Content is base64 encoded
      var jsonStr = atob64(text.trim());
      session = JSON.parse(jsonStr);
    } catch (err) {
      alert('Could not parse file: ' + err.message);
      return;
    }

    // Verify integrity
    var valid = verifySession(session);
    session.__valid = valid;
    session.__id = session.sessionId;

    // Deduplication: keep earliest per testerName (scoped by test type so a
    // first-click and an exploratory run by the same tester don't collide).
    var nameKey = (session.testType || 'first-click') + '::' + (session.testerName || '__anonymous__');
    var existing = sessionsByName[nameKey];
    if (existing) {
      if (session.sessionStart.wallMs < existing.sessionStart.wallMs) {
        // Replace with earlier attempt
        sessionsByName[nameKey] = session;
        var idx = allSessions.indexOf(existing);
        if (idx !== -1) allSessions[idx] = session;
      }
      // else discard this one as later attempt
    } else {
      sessionsByName[nameKey] = session;
      allSessions.push(session);
    }

    renderSidebar();
    if (!activeSessionId) {
      activateSession(session.__id);
    } else {
      renderViewer();
    }
  }

  function atob64(b64) {
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return decodeURIComponent(escape(String.fromCharCode.apply(null, bytes)));
  }

  function verifySession(session) {
    try {
      var storedSig = session.integrity && session.integrity.sig;
      if (!storedSig) return false;

      // Build data object without integrity field. Exploratory sessions sign
      // a different field set than first-click ones; match each shape exactly.
      var data;
      if (session.testType === 'exploratory' || session.clicks) {
        data = {
          schemaVersion: session.schemaVersion,
          testType: session.testType,
          sessionId: session.sessionId,
          testerName: session.testerName,
          sessionStart: session.sessionStart,
          sessionEnd: session.sessionEnd,
          clicks: session.clicks,
          screenshot: session.screenshot
        };
      } else {
        data = {
          schemaVersion: session.schemaVersion,
          sessionId: session.sessionId,
          testerName: session.testerName,
          sessionStart: session.sessionStart,
          click: session.click,
          screenshot: session.screenshot
        };
      }

      var expected = sha256hex(canonicalJSON(data) + '|' + SECRET);
      return expected === storedSig;
    } catch (e) {
      return false;
    }
  }

  /* ---- Sidebar rendering ---- */
  function renderSidebar() {
    sessionCount.textContent = allSessions.length;
    sessionList.innerHTML = '';
    allSessions.forEach(function (s) {
      var item = document.createElement('div');
      item.className = 'session-item' + (s.__id === activeSessionId ? ' active' : '');
      item.setAttribute('data-id', s.__id);

      var name = document.createElement('div');
      name.className = 'session-name';
      name.textContent = s.testerName || '(anonymous)';

      var meta = document.createElement('div');
      meta.className = 'session-meta';
      if (s.testType === 'exploratory' || s.clicks) {
        var n = (s.clicks || []).length;
        var dur = s.sessionEnd && s.sessionEnd.durationMs;
        meta.textContent = '🧭 ' + n + (n === 1 ? ' click' : ' clicks') +
          (dur != null ? ' · ' + formatMs(dur) : '');
      } else {
        var ttc = s.click && s.click.timeToClickMs;
        meta.textContent = ttc != null ? formatMs(ttc) + ' to first click' : 'No click recorded';
      }

      var badge = document.createElement('div');
      badge.className = 'validity-badge ' + (s.__valid ? 'badge-valid' : 'badge-invalid');
      badge.textContent = s.__valid ? '✓ Valid' : '⚠ Signature mismatch';

      item.appendChild(name);
      item.appendChild(meta);
      item.appendChild(badge);
      item.addEventListener('click', function () { activateSession(s.__id); });
      sessionList.appendChild(item);
    });
  }

  function formatMs(ms) {
    if (ms < 1000) return ms + 'ms';
    return (ms / 1000).toFixed(1) + 's';
  }

  /* ---- Activate a session ---- */
  function activateSession(id) {
    activeSessionId = id;
    renderSidebar();
    renderViewer();
    dropZone.style.display = 'none';
    viewerArea.classList.add('visible');
  }

  /* ---- Viewer rendering ---- */
  function renderViewer() {
    // Clear existing hotspots + any exploratory path overlay
    var existing = screenshotWrap.querySelectorAll('.hotspot, #path-overlay');
    existing.forEach(function (el) { el.parentNode.removeChild(el); });

    var active = allSessions.filter(function (s) { return s.__id === activeSessionId; })[0];
    if (!active) return;

    var screenshot = active.screenshot;
    if (!screenshot || !screenshot.dataURI) {
      screenshotImg.style.display = 'none';
      document.getElementById('viewer-empty').style.display = 'block';
      return;
    }

    document.getElementById('viewer-empty').style.display = 'none';
    screenshotImg.style.display = 'block';
    screenshotImg.src = screenshot.dataURI;

    if (active.testType === 'exploratory' || active.clicks) {
      // Exploratory: show only the active session's clicks as a numbered path.
      var clicks = active.clicks || [];
      if (clicks.length > 1) {
        screenshotWrap.appendChild(createPathOverlay(clicks));
      }
      clicks.forEach(function (click, i) {
        screenshotWrap.appendChild(createExploratoryHotspot(active, click, i + 1));
      });
    } else {
      // First-click: overlay every (first-click) session's single click.
      allSessions.forEach(function (s) {
        if (s.testType === 'exploratory' || s.clicks) return;
        if (!s.click) return;
        var hotspot = createHotspot(s, s.__id === activeSessionId);
        screenshotWrap.appendChild(hotspot);
      });
    }
  }

  /* ---- Exploratory: connecting path between consecutive clicks ---- */
  function createPathOverlay(clicks) {
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('id', 'path-overlay');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    var poly = document.createElementNS(svgNS, 'polyline');
    poly.setAttribute('points', clicks.map(function (c) {
      return c.xPct + ',' + c.yPct;
    }).join(' '));
    poly.setAttribute('class', 'path-line');
    svg.appendChild(poly);
    return svg;
  }

  function createExploratoryHotspot(session, click, num) {
    var el = document.createElement('div');
    el.className = 'hotspot active';
    el.style.left = click.xPct + '%';
    el.style.top = click.yPct + '%';

    var badge = document.createElement('div');
    badge.className = 'order-badge';
    badge.textContent = num;

    var tooltip = document.createElement('div');
    tooltip.className = 'tooltip';

    var nameEl = document.createElement('strong');
    nameEl.textContent = 'Click #' + num + (session.testerName ? ' · ' + session.testerName : '');
    tooltip.appendChild(nameEl);

    var lines = [
      'At ' + formatMs(click.timeSinceStartMs) + ' into session',
      'Element: ' + (click.targetSelector || 'unknown'),
      click.targetText ? 'Text: "' + click.targetText.slice(0, 60) + '"' : ''
    ];
    lines.forEach(function (line) {
      if (!line) return;
      var span = document.createElement('div');
      span.textContent = line;
      tooltip.appendChild(span);
    });

    el.appendChild(badge);
    el.appendChild(tooltip);
    return el;
  }

  function createHotspot(session, isActive) {
    var click = session.click;
    var xPct = click.xPct;
    var yPct = click.yPct;

    var el = document.createElement('div');
    el.className = 'hotspot' + (isActive ? ' active' : ' dim');
    el.style.left = xPct + '%';
    el.style.top = yPct + '%';

    // SVG ring + dot
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '40');
    svg.setAttribute('height', '40');
    svg.setAttribute('viewBox', '-20 -20 40 40');

    var ring = document.createElementNS(svgNS, 'circle');
    ring.setAttribute('cx', '0');
    ring.setAttribute('cy', '0');
    ring.setAttribute('r', '14');
    ring.setAttribute('class', 'ring');

    var dot = document.createElementNS(svgNS, 'circle');
    dot.setAttribute('cx', '0');
    dot.setAttribute('cy', '0');
    dot.setAttribute('r', '4');
    dot.setAttribute('class', 'dot');

    svg.appendChild(ring);
    svg.appendChild(dot);

    // Tooltip
    var tooltip = document.createElement('div');
    tooltip.className = 'tooltip';

    var nameEl = document.createElement('strong');
    nameEl.textContent = session.testerName || '(anonymous)';
    tooltip.appendChild(nameEl);

    var lines = [
      'Time to click: ' + formatMs(click.timeToClickMs),
      'Element: ' + (click.targetSelector || 'unknown'),
      click.targetText ? 'Text: "' + click.targetText.slice(0, 60) + '"' : ''
    ];
    lines.forEach(function (line) {
      if (!line) return;
      var span = document.createElement('div');
      span.textContent = line;
      tooltip.appendChild(span);
    });

    el.appendChild(svg);
    el.appendChild(tooltip);

    el.addEventListener('click', function (e) {
      e.stopPropagation();
      activateSession(session.__id);
    });

    return el;
  }

}());
</script>
</body>
</html>
