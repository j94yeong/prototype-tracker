<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Click Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    color: #111;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #card {
    width: 460px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    padding: 32px;
  }
  h1 { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 22px; line-height: 1.5; }

  #drop-zone {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    color: #999;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 18px;
  }
  #drop-zone.drag-over { border-color: #4f8ef7; background: #eef3ff; color: #4f8ef7; }
  #drop-zone-icon { font-size: 32px; margin-bottom: 8px; }
  #drop-zone p { font-size: 13px; }
  #drop-zone .file-name { font-weight: 600; color: #4f8ef7; margin-top: 6px; word-break: break-all; }

  label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 500; }
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 14px;
    font-size: 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    outline: none;
    margin-bottom: 18px;
    color: #111;
  }
  input[type="text"]:focus { border-color: #4f8ef7; }

  button {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  #load-prototype-btn { background: #4f8ef7; color: #fff; }
  #load-prototype-btn:hover { background: #3a7ae0; }
  #load-prototype-btn:disabled { background: #bcd2f5; cursor: not-allowed; }
  #reset-btn { background: #eee; color: #333; display: none; }
  #reset-btn:hover { background: #ddd; }

  #status {
    margin-top: 14px;
    font-size: 13px;
    color: #555;
    line-height: 1.5;
    min-height: 18px;
  }
  #status.success { color: #1a8040; font-weight: 600; }
</style>
</head>
<body>
  <div id="card">
    <h1>First Click Tracker</h1>
    <div class="sub">Load a prototype's index.html, optionally name the tester, then watch for their first click. A signed .fct file is saved automatically.</div>

    <div id="drop-zone">
      <div id="drop-zone-icon">&#128193;</div>
      <p>Drag an index.html here, or click to browse</p>
      <div class="file-name" id="file-name"></div>
    </div>

    <label for="tester-name">Tester name (optional)</label>
    <input type="text" id="tester-name" placeholder="e.g. Jane Smith">

    <button id="load-prototype-btn" disabled>Load Prototype</button>
    <button id="reset-btn">Load another prototype</button>

    <div id="status"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
